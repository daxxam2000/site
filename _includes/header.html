<nav class="nav wrap" aria-label="Primary">
  <ul>
    {% for item in site.nav %}
      <li>
        <a href="{{ item.url | relative_url }}"
           {% if page.url == item.url %}aria-current="page"{% endif %}>
          {% if item.index %}<span class="num">{{ item.index }}</span>{% endif %}
          <span>{{ item.title }}</span>
        </a>
      </li>
    {% endfor %}
  </ul>
</nav>
