# ──────────────────────────────────────────────────────────────────
# SITE
# ──────────────────────────────────────────────────────────────────
title: "Maxfield Weir"
tagline: "philosophy / fiction / essays / updates"
description: >-
  A personal site for writing, photography, and tabletop role-playing games.
author: "Maxfield Weir"
email: "maxfieldjweir@me.com"

# Set this to your GitHub Pages URL once you know it.
# For user/organisation sites: https://<user>.github.io
# For project sites:           https://<user>.github.io/<repo>
url: "https://maxfieldjweir.com"
baseurl: ""

# ──────────────────────────────────────────────────────────────────
# BUILD
# ──────────────────────────────────────────────────────────────────
markdown: kramdown
highlighter: rouge
permalink: /:categories/:year/:month/:day/:title/
timezone: Europe/London

# Plugins available on GitHub Pages without custom build.
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-paginate

paginate: 10
paginate_path: "/page/:num/"

# ──────────────────────────────────────────────────────────────────
# COLLECTIONS
# ──────────────────────────────────────────────────────────────────
collections:
  photo_projects:
    output: true
    permalink: /photography/:path/
  ttrpg:
    output: true
    permalink: /ttrpg/:path/

# ──────────────────────────────────────────────────────────────────
# DEFAULTS
# ──────────────────────────────────────────────────────────────────
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
  - scope:
      path: ""
      type: photo_projects
    values:
      layout: photo-project
  - scope:
      path: ""
      type: ttrpg
    values:
      layout: ttrpg

# ──────────────────────────────────────────────────────────────────
# CATEGORIES (used by the navigation + archive pages)
# ──────────────────────────────────────────────────────────────────
categories_list:
  - philosophy
  - fiction
  - essays
  - updates

# ──────────────────────────────────────────────────────────────────
# NAV (top-level links). `tone` drives the hero panel colour:
#   ink    → black panel, paper text
#   accent → orange panel, paper text
#   soft   → mid-grey panel, ink text
# `index` is the small mono ordinal (e.g. 1.0, 2.0) shown in the corner.
# ──────────────────────────────────────────────────────────────────
nav:
  - { title: "Index",       url: "/",                     index: "0.0", tone: "accent" }
  - { title: "Philosophy",  url: "/category/philosophy/", index: "1.0", tone: "ink"    }
  - { title: "Fiction",     url: "/category/fiction/",    index: "2.0", tone: "soft"   }
  - { title: "Essays",      url: "/category/essays/",     index: "3.0", tone: "ink"    }
  - { title: "Updates",     url: "/category/updates/",    index: "4.0", tone: "accent" }
  - { title: "Photography", url: "/photography/",         index: "5.0", tone: "ink"    }
  - { title: "TTRPG",       url: "/ttrpg/",               index: "6.0", tone: "accent" }
  - { title: "About",       url: "/about/",               index: "7.0", tone: "soft"   }

# ──────────────────────────────────────────────────────────────────
# EXCLUDE
# ──────────────────────────────────────────────────────────────────
exclude:
  - Gemfile
  - Gemfile.lock
  - vendor
  - node_modules
  - README.md
  - .sass-cache
  - .jekyll-cache
