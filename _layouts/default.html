<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <!-- Mark JS-enabled clients so we can hide kramdown's default footnotes block
       (littlefoot will replace it with a popover). No-JS users see the normal list. -->
  <script>document.documentElement.classList.add('js');</script>
  <title>{% if page.title %}{{ page.title | escape }} — {{ site.title | escape }}{% else %}{{ site.title | escape }}{% endif %}</title>
  <meta name="description" content="{{ page.description | default: site.description | strip_html | normalize_whitespace | truncate: 160 }}">
  <!-- Type: Inter for sans/display, JetBrains Mono for UI / labels -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
  <!-- littlefoot — turns kramdown footnotes into popovers -->
  <link rel="stylesheet" href="https://unpkg.com/littlefoot@4/dist/littlefoot.css">
  {%- feed_meta -%}
  {%- seo -%}
</head>
<body>
  <div class="wrap">
    {% include header.html %}
  </div>
  <main class="wrap" role="main">
    {{ content }}
  </main>
  <div class="wrap">
    {% include footer.html %}
  </div>
  <!-- Share dropdown (meta strip): copy URL, social intents, click-outside-close. -->
  <script>
    (function () {
      function copyText(text) {
        if (navigator.clipboard && navigator.clipboard.writeText) {
          return navigator.clipboard.writeText(text).catch(legacy);
        }
        return new Promise(function (resolve) { legacy(); resolve(); });
        function legacy() {
          var i = document.createElement('input');
          i.value = text;
          document.body.appendChild(i);
          i.select();
          try { document.execCommand('copy'); } catch (e) {}
          i.remove();
        }
      }

      // The share dropdown is a plain button + div (no <details>). The button
      // carries aria-expanded; the menu has a `hidden` attribute. JS owns
      // the entire toggle state, so there are zero browser quirks to fight.

      function setShareOpen(share, open) {
        var btn = share.querySelector('.share__toggle');
        var menu = share.querySelector('.share__menu');
        if (!btn || !menu) return;
        btn.setAttribute('aria-expanded', open ? 'true' : 'false');
        if (open) menu.removeAttribute('hidden');
        else menu.setAttribute('hidden', '');
      }

      function bindShareToggles() {
        document.querySelectorAll('.share .share__toggle').forEach(function (btn) {
          if (btn.dataset.shareBound) return;
          btn.dataset.shareBound = '1';
          btn.addEventListener('click', function (e) {
            e.preventDefault();
            e.stopPropagation();
            var share = btn.closest('.share');
            var willOpen = btn.getAttribute('aria-expanded') !== 'true';
            // Close other share dropdowns first.
            document.querySelectorAll('.share').forEach(function (s) {
              if (s !== share) setShareOpen(s, false);
            });
            setShareOpen(share, willOpen);
          });
        });
      }
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', bindShareToggles);
      } else {
        bindShareToggles();
      }

      // Menu item clicks + outside-close.
      document.addEventListener('click', function (e) {
        var trigger = e.target.closest('[data-share]');
        if (trigger) {
          var share = trigger.closest('.share');
          var url = (share && share.dataset.shareUrl) || window.location.href;
          var text = (share && share.dataset.shareText) || document.title;
          var action = trigger.dataset.share;

          if (action === 'copy') {
            e.preventDefault();
            copyText(url).then(function () {
              trigger.classList.add('is-copied');
              setTimeout(function () { trigger.classList.remove('is-copied'); }, 1600);
            });
            return;
          }

          var u;
          if (action === 'bluesky') {
            u = 'https://bsky.app/intent/compose?text=' + encodeURIComponent(text + ' ' + url);
          } else if (action === 'mastodon') {
            u = 'https://toot.kytta.dev/?text=' + encodeURIComponent(text + ' ' + url);
          } else if (action === 'email') {
            u = 'mailto:?subject=' + encodeURIComponent(text) + '&body=' + encodeURIComponent(url);
          }
          if (u) {
            e.preventDefault();
            window.open(u, action === 'email' ? '_self' : '_blank', 'noopener');
            if (share) setShareOpen(share, false);
          }
          return;
        }

        // Click outside any .share closes all open dropdowns.
        if (!e.target.closest('.share')) {
          document.querySelectorAll('.share').forEach(function (s) { setShareOpen(s, false); });
        }
      });

      // Esc closes any open dropdown.
      document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape') {
          document.querySelectorAll('.share').forEach(function (s) { setShareOpen(s, false); });
        }
      });
    })();
  </script>
  <!-- littlefoot init — runs after DOM + script are ready -->
  <script src="https://unpkg.com/littlefoot@4/dist/littlefoot.js" defer></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      if (typeof littlefoot === 'undefined') return;
      var lf = (typeof littlefoot === 'function') ? littlefoot : littlefoot.littlefoot;
      if (typeof lf === 'function') {
        lf({
          activateOnHover: false,
          allowMultiple: true,
          dismissOnUnhover: false,
          buttonTemplate:
            '<button aria-controls="fncontent:<% id %>" aria-expanded="false" '
            + 'aria-label="Footnote <% number %>" class="littlefoot__button" '
            + 'id="<% reference %>" rel="footnote" title="See Footnote <% number %>">'
            + '<% number %></button>'
        });
      }
    });
  </script>
</body>
</html>
