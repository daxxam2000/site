---
layout: default
---
<article class="post prose">
  <p class="meta">
    {%- assign cat = page.category | default: page.categories[0] -%}
    {% if cat %}<a class="cat" href="{{ '/category/' | append: cat | append: '/' | relative_url }}">{{ cat }}</a>{% endif %}
    <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%Y-%m-%d" }}</time>
  </p>
  <h1>{{ page.title }}</h1>
  {{ content }}
  <hr>
  <p class="meta">
    <a href="{{ '/' | relative_url }}">← Back to index</a>
  </p>
</article>
